# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config: {}
binds:
  - port: 3000
    listeners:
      - protocol: HTTP
        routes:
          - policies:
              cors:
                allowOrigins: ['*']
                allowHeaders: ['*']
                exposeHeaders: ['Mcp-Session-Id']
              mcpAuthorization:
                rules:
                  # VÁLVULA INTELIGENTE CEL (FIREWALL V5 - O PONTO DE EQUILÍBRIO)
                  # 1. Permite indexação de código, arquivos e git (JCodeMunch e Github)
                  # 2. Permite leitura de documentos e cadernos (NotebookLM)
                  # 3. Permite acesso SQLite e utilitários (Tempo/Raciocínio)
                  # 4. Bloqueia explicitamente a Busca Web (Conforme PRD Milestone 1)
                  - >
                    mcp.tool.name.matches(".*(index|ast|symbol|file|issue|pull|repo|commit|push|diff).*")
                    ||
                    mcp.tool.name.matches(".*(notebook|document|ask|source|query|table|time|sequential).*")
            backends:
              - mcp:
                  failureMode: failOpen
                  targets:
                    # 1. AST Parser
                    - name: jcodemunch
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'jcodemunch-mcp']
                    
                    # 2. Servidor de Tempo
                    - name: time_server
                      stdio:
                        cmd: 'mcp-server-time.exe'
                        args: []
                        env:
                          PATH: 'C:/Users/rosas/.cargo/bin;C:/Windows/System32'
                    
                    # 3. Memória L2 Transacional
                    - name: sqlite_soda
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'mcp-server-sqlite', '--db-path', 'genesis.db']
                    
                    # 4. Raciocínio Passo-a-Passo
                    - name: sequential_thinking
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-sequential-thinking']
                    
                    # 5. Pesquisa Web Gratuita
                    - name: duckduckgo_search
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'duckduckgo-mcp-server']
                    
                    # 6. Integração Git/PRs
                    - name: github_mcp
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-github']
                        env:
                          GITHUB_PERSONAL_ACCESS_TOKEN: '${GITHUB_PAT}'
                    
                    # 7. O ORÁCULO DE CONTEXTO (NotebookLM)
                    - name: notebooklm
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', '--from', 'notebooklm-mcp-cli', 'notebooklm-mcp']