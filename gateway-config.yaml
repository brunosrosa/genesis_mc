# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config: {}
binds:
  - port: 3000
    listeners:
      - protocol: HTTP
        routes:
          - policies:
              cors:
                allowOrigins: ['*']
                allowHeaders: ['*']
                exposeHeaders: ['Mcp-Session-Id']
              mcpAuthorization:
                rules:
                  # VÁLVULA INTELIGENTE CEL (FIREWALL ANTI-BLOAT V3)
                  # AVALIAÇÃO RAW: O Gateway lê os nomes AQUI antes de adicionar prefixos.
                  # A regra permite ferramentas exatas (ex: ast_parse, sequential_thinking) 
                  # OU ferramentas que contenham palavras essenciais (ex: file, issue, query, search).
                  - >
                    mcp.tool.name.matches("^(index_repo|index_folder|ast_parse|get_file_outline|search_symbols|sequential_thinking|get_current_time)$")
                    ||
                    mcp.tool.name.matches(".*(file|issue|pull|repo|search|ask|source|doc|notebook|read|query|table).*")
            backends:
              - mcp:
                  failureMode: failOpen
                  targets:
                    # 1. AST Parser
                    - name: jcodemunch
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'jcodemunch-mcp']
                    
                    # 2. Servidor de Tempo
                    - name: time_server
                      stdio:
                        cmd: 'mcp-server-time.exe'
                        args: []
                        env:
                          PATH: 'C:/Users/rosas/.cargo/bin;C:/Windows/System32'
                    
                    # 3. Memória L2 Transacional
                    - name: sqlite_soda
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'mcp-server-sqlite', '--db-path', 'genesis.db']
                    
                    # 4. Raciocínio Passo-a-Passo
                    - name: sequential_thinking
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-sequential-thinking']
                    
                    # 5. Pesquisa Web Gratuita
                    - name: duckduckgo_search
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'duckduckgo-mcp-server']
                    
                    # 6. Integração Git/PRs
                    - name: github_mcp
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-github']
                        env:
                          GITHUB_PERSONAL_ACCESS_TOKEN: '${GITHUB_PAT}'
                    
                    # 7. O ORÁCULO DE CONTEXTO (NotebookLM)
                    - name: notebooklm
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', '--from', 'notebooklm-mcp-cli', 'notebooklm-mcp']