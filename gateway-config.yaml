# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config: {}
binds:
  - port: 3000
    listeners:
      - protocol: HTTP
        routes:
          - policies:
              cors:
                allowOrigins: ['*']
                allowHeaders: ['*']
                exposeHeaders: ['Mcp-Session-Id']
              mcpAuthorization:
                rules:
                  # VÁLVULA INTELIGENTE CEL (FIREWALL ANTI-BLOAT V4 - STRICT ALLOWLIST)
                  # AVALIAÇÃO RAW: Libera EXATAMENTE as ferramentas descritas abaixo, bloqueando todo o resto.
                  - >
                    mcp.tool.name.matches("^(index_repo|index_folder|ast_parse|get_file_outline|search_symbols|sequential_thinking|get_current_time|duckduckgo_search)$")
                    ||
                    mcp.tool.name.matches("^(get_file_contents|search_repositories|search_code|get_issue|get_pull_request|create_issue|create_pull_request|push_files)$")
                    ||
                    mcp.tool.name.matches("^(ask_question|list_notebooks|list_documents|read_document)$")
                    ||
                    mcp.tool.name.matches("^(query|list_tables|describe_table)$")
            backends:
              - mcp:
                  failureMode: failOpen
                  targets:
                    # 1. AST Parser
                    - name: jcodemunch
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'jcodemunch-mcp']
                    
                    # 2. Servidor de Tempo
                    - name: time_server
                      stdio:
                        cmd: 'mcp-server-time.exe'
                        args: []
                        env:
                          PATH: 'C:/Users/rosas/.cargo/bin;C:/Windows/System32'
                    
                    # 3. Memória L2 Transacional
                    - name: sqlite_soda
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'mcp-server-sqlite', '--db-path', 'genesis.db']
                    
                    # 4. Raciocínio Passo-a-Passo
                    - name: sequential_thinking
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-sequential-thinking']
                    
                    # 5. Pesquisa Web Gratuita
                    - name: duckduckgo_search
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', 'duckduckgo-mcp-server']
                    
                    # 6. Integração Git/PRs
                    - name: github_mcp
                      stdio:
                        cmd: 'npx.cmd'
                        args: ['-y', '@modelcontextprotocol/server-github']
                        env:
                          GITHUB_PERSONAL_ACCESS_TOKEN: '${GITHUB_PAT}'
                    
                    # 7. O ORÁCULO DE CONTEXTO (NotebookLM)
                    - name: notebooklm
                      stdio:
                        cmd: 'uvx.exe'
                        args: ['--quiet', '--from', 'notebooklm-mcp-cli', 'notebooklm-mcp']