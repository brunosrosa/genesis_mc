# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config: {}
binds:
  - port: 3000
    listeners:
      - protocol: HTTP
        routes:
          - policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: ["*"]
                exposeHeaders: ["Mcp-Session-Id"]
            backends:
              - mcp:
                  targets:
                    - name: jcodemunch
                      stdio:
                        cmd: "uvx.exe"
                        args: ["--quiet", "jcodemunch-mcp"]
                    - name: time_server
                      stdio:
                        cmd: "mcp-server-time.exe"
                        args: []
                    - name: sqlite_soda
                      stdio:
                        cmd: "uvx.exe"
                        args: ["--quiet", "mcp-server-sqlite", "--db-path", "genesis.db"]